services:
  postgres:
    image: postgres:16-alpine
    container_name: vendbot_db
    environment:
      POSTGRES_DB:       vendbot
      POSTGRES_USER:     vendbot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # Sem ports expostos — só acessível internamente
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vendbot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: vendbot_redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    # Sem ports expostos — só acessível internamente
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: vendbot_api
    env_file: .env
    environment:
      - PYTHONPATH=/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # Sem --reload em produção
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2 --proxy-headers

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: vendbot_worker
    env_file: .env
    environment:
      - PYTHONPATH=/app
    # Worker roda como usuário sem privilégios
    user: "1000:1000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=2 --uid=nobody

  bot:
    build:
      context: apps/bot
      dockerfile: Dockerfile
    container_name: vendbot_bot
    env_file: .env
    environment:
      - API_URL=http://api:8000
      - BOT_INTERNAL_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

  panel:
    build:
      context: apps/panel
      dockerfile: Dockerfile
    container_name: vendbot_panel
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
